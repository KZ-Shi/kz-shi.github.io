# Site Settings
locale                   : "en-US"
title                    : "Kaize Shi"
title_separator          : "-"
name                     : &name "Kaize Shi"
description              : &description "Personal homepage of Kaize Shi, Lecturer at the University of Southern Queensland."
url                      : https://kz-shi.github.io   # CHANGE: if you ever switch to a custom domain
baseurl                  : ""                          # leave empty when repo name is USERNAME.github.io
repository               : "kz-shi/kz-shi.github.io"   # CHANGE: must match your renamed repo
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Site Author (left sidebar)
author:
  avatar                 : "Kaize Shi.png"   # put your photo at images/Kaize Shi.png
  name                   : "Kaize Shi 时恺泽"
  pronouns               :
  bio                    : "Lecturer / Assistant Professor"
  location               : "Brisbane, Australia"
  employer               : "University of Southern Queensland"
  uri                    :
  email                  : "Kaize.Shi@unisq.edu.au"
  ieee                   : "Kaize.Shi@ieee.org"

  # Academic profiles
  googlescholar          : "https://scholar.google.com/citations?user=iB3IJNUAAAAJ"
  researchgate           :                                      # CHANGE: paste your ResearchGate URL if you have one
  orcid                  : "https://orcid.org/0000-0003-3561-3627"                                     # CHANGE: paste your ORCID URL, e.g. https://orcid.org/0000-0000-0000-0000
  dblp                   : "https://dblp.org/pid/233/6951.html" # CHANGE: confirm and update if different
  semantic               :                                      # optional Semantic Scholar URL

  # Social
  github                 : "kz-shi"
  linkedin               : "https://www.linkedin.com/in/kaize-shi/"                          # CHANGE: confirm your LinkedIn handle
  twitter                :
  weibo                  :
  zhihu                  :
  bilibili               :
  facebook               :

  # University / personal
  homepage               : "https://staffprofile.unisq.edu.au/Profile/Kaize-Shi"  # CHANGE: paste your real UniSQ profile URL
  cv                     : ""             # put your CV pdf at files/

# Google scholar stats - shows the citation badge in the top-right of About Me
scholar:
  id                     : "iB3IJNUAAAAJ"     # your Google Scholar ID, parsed from the user= parameter
  cache_path             : "/google-scholar-stats/gs_data.json"

google_scholar_stats_use_cdn : true

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding                 : "utf-8"
markdown_ext             : "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown                 : kramdown
highlighter              : rouge
lsi                      : false
excerpt_separator        : "\n\n"
incremental              : false

# Markdown Processing
kramdown:
  input                  : GFM
  hard_wrap              : false
  auto_ids               : true
  footnote_nr            : 1
  entity_output          : as_char
  toc_levels             : 1..6
  smart_quotes           : lsquo,rsquo,ldquo,rdquo
  enable_coderay         : false

# Sass/SCSS
sass:
  sass_dir               : _sass
  style                  : compressed

# Outputting
permalink                : /:categories/:title/
timezone                 : Australia/Brisbane

# Plugins (whitelisted for GitHub Pages)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path                : ""
      type                : pages
    values:
      layout              : single
      author_profile      : true
